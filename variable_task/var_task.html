<!DOCTYPE html>
<html lang="en">
<head>
    <title>JavaScript Basics Demo</title>
     <link rel="stylesheet" href="var.css">
</head>

<body>
    <main>

     <h1>JavaScript Basics Demo</h1>

         <section class="flex-container first-flex">

            <h2>Variables Example</h2>
            <label>City</label>
            <input type="text" id="cityname" placeholder="Enter City">
            <label>Your Age</label>
            <input type="text" id="yourage" placeholder="Enter your Age">
            <label>Your Country</label>
            <input type="text" id="yourcountry" placeholder="Enter your Country">
            <button onclick="showVariables()">Show Variables</button>

         </section>

        <section class="flex-container second-flex">

            <h2>Function Example</h2>
            <button onclick="sayHello()">Run Function</button>


        </section>

        <section class="flex-container third-flex">

            <h2>User Input Example</h2>
            <input type="text" id="username" placeholder="Enter your name">
            <button onclick="showName()">Submit</button>

        </section>

         <section class="result">

            <h2>Output</h2>
            <p id="output">Result will appear here</p>

         </section>

    </main>
<script src="var.js"></script>

</body>
</html>
